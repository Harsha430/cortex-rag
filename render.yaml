services:
  # Backend Web Service
  - type: web
    name: cortex-rag-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false

  # Frontend Static Site
  - type: static
    name: cortex-rag-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://cortex-rag-backend.onrender.com
